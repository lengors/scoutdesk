networks:
  webscout:

volumes:
  postgres:
    driver: local
  postgres-webscout:
    driver: local

services:
  postgres:
    image: "postgres:17.0-alpine"
    environment:
      - "POSTGRES_DB=scoutdesk"
      - "POSTGRES_PASSWORD=secret"
      - "POSTGRES_USER=postgres"
    ports:
      - "5432"

  postgres-webscout:
    image: "postgres:17.0-alpine"
    environment:
      - "POSTGRES_DB=webscout"
      - "POSTGRES_PASSWORD=secret"
      - "POSTGRES_USER=postgres"
    volumes:
      - postgres-webscout:/var/lib/postgresql/data
    networks:
      - webscout
    labels:
      org.springframework.boot.ignore: true
    profiles:
      - webscout

  duckling:
    image: "rasa/duckling:0.2.0.2"
    networks:
      - "webscout"
    profiles:
      - webscout

  webscout:
    image: "ghcr.io/lengors/webscout:1.0.0"
    ports:
      - "8080"
    environment:
      - "DATABASE_URL=postgresql://postgres-webscout:5432/webscout"
      - "DATABASE_USERNAME=postgres"
      - "DATABASE_PASSWORD=secret"
      - "DUCKLING_CLIENT_URL=http://duckling:8000"
    networks:
      - "webscout"
    profiles:
      - webscout
